<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trev - Login</title>
        <link rel="stylesheet" href="../../../shared/css/variables.css">
        <link rel="stylesheet" href="../../../shared/css/global.css">
        <link rel="stylesheet" href="../../../shared/css/header-footer.css">
        <link rel="stylesheet" href="login.css">
    </head>

    <body data-page="login">
        <div id="header"></div>

        <main>
            <div class="container">
                <div class="login-card">
                    <h2>Welcome Back</h2>
                    <p>Sign in to continue your adventure</p>
                    <form id="loginForm" method="POST">
                        <label>Email Address</label>
                        <input type="email" id="email"
                            placeholder="you@example.com">
                        <small class="error" id="emailError"></small>

                        <label>Password</label>
                        <input type="password" id="password"
                            placeholder="Enter your password">
                        <small class="error" id="passwordError"></small>

                        <div class="forgot">
                            <a href="#">Forgot password?</a>
                        </div>

                        <div class="terms">
                            <input type="checkbox" id="terms">
                            <span>I agree to the <a href="#">Terms of
                                    Service</a> and <a href="#">Privacy
                                    Policy</a></span>
                        </div>
                        <small class="error" id="termsError"></small>

                        <button type="submit">Login</button>
                    </form>
                    <p class="register">
                        Don't have an account? <a
                            href="../Register/register.html">Register here</a>
                    </p>

                    <div class="divider">Or continue with</div>

                    <button class="google-btn">Google</button>
                </div>
            </div>
        </main>

        <script src="../../../shared/js/main.js"></script>
        <script src="login.js"></script>
    </body>
</html>
