<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Destination</title>

    <link rel="stylesheet" href="../../../shared/css/variables.css">
    <link rel="stylesheet" href="../../../shared/css/global.css">
    <link rel="stylesheet" href="../../../shared/css/components.css">
    <link rel="stylesheet" href="../../../shared/css/header-footer.css">
    <link rel="stylesheet" href="M_destination.css">
</head>

<body data-page="manage-destination">

<div id="page-wrapper">

    <div id="header"></div>

    <main id="page-content">

        <section class="destination-section">

            <h1>Manage Destinations</h1>

            <div class="filter-row">
                <input type="text" id="searchInput" placeholder="Search destinations...">

                <select id="countryFilter">
                    <option value="">All Countries</option>
                </select>

                <select id="categoryFilter">
                    <option value="">All Categories</option>
                </select>
            </div>

            <div id="destinationGrid" class="destination-grid"></div>

        </section>

    </main>

    <div id="footer"></div>

</div>

<button class="floating-add-btn" onclick="openAddModal()">+</button>

<div id="popup-container"></div>

<script src="../../../shared/js/admin_main.js"></script>
<script src="M_destination.js"></script>

</body>
</html>
