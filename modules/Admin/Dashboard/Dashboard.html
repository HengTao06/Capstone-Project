<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trev - Admin Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../../shared/css/variables.css">
    <link rel="stylesheet" href="../../../shared/css/global.css">
    <link rel="stylesheet" href="../../../shared/css/header-footer.css">
    <link rel="stylesheet" href="../../../shared/css/components.css">
    
    <link rel="stylesheet" href="Dashboard.css">

    <script src="../../../shared/js/admin_main.js"></script>
    <script src="Dashboard.js"></script>
</head>
<body data-page="admin-dashboard">

    <div id="header"></div>

    <main class="container admin-main">
        <h1 class="section-title">Admin Dashboard</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="icon-box"><i class="fa-solid fa-users"></i></div>
                    <div class="trend"><i class="fa-solid fa-arrow-up"></i> Live</div>
                </div>
                <div class="stat-number" id="stat-users">0</div>
                <div class="stat-label">Total Users</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div class="icon-box"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
                    <div class="trend"><i class="fa-solid fa-arrow-up"></i> Live</div>
                </div>
                <div class="stat-number" id="stat-trips">0</div>
                <div class="stat-label">Total Trips</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div class="icon-box"><i class="fa-solid fa-star"></i></div>
                    <div class="trend"><i class="fa-solid fa-arrow-up"></i> Live</div>
                </div>
                <div class="stat-number" id="stat-reviews">0</div>
                <div class="stat-label">Total Reviews</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div class="icon-box"><i class="fa-solid fa-location-dot"></i></div>
                    <div class="trend"><i class="fa-solid fa-arrow-up"></i> Live</div>
                </div>
                <div class="stat-number" id="stat-dest">0</div>
                <div class="stat-label">Active Attractions</div>
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-title">Top Destinations</h2>
            <a href="#" class="section-see-all">View Details &rarr;</a>
        </div>
        
        <div class="destinations-grid" id="adminDestGrid">
            </div>

        <div class="section-header" style="margin-top: 40px;">
            <h2 class="section-title">Top reviews</h2>
            <a href="#" class="section-see-all">View Details &rarr;</a>
        </div>
        <div class="reviews-grid" id="adminReviewGrid">
            </div>
    </main>

    <div id="footer"></div>

</body>
</html>
